<header class="site-header">
  <div class="container header-inner">
    <a class="brand" routerLink="/" fragment="top">
      <img src="logo.jpeg" alt="Colibri Italdiszkont logó" />
      <span>
        <strong>Colibri Italdiszkont</strong>
        <small>Dunavarsány</small>
      </span>
    </a>

    @if (variant === 'home') {
      <nav class="site-nav">
        <a routerLink="/" fragment="top">Főoldal</a>
        <a routerLink="/" fragment="kinalat">Kínálat</a>
        <a routerLink="/" fragment="akciok">Akciók</a>
        <a routerLink="/" fragment="kapcsolat">Kapcsolat</a>
      </nav>
      <a class="btn btn-solid desktop-only" routerLink="/" fragment="kinalat">Megnézem a kínálatot</a>
    } @else {
      <nav class="site-nav">
        <a routerLink="/">Főoldal</a>
        <a routerLink="/impresszum">Impresszum</a>
        <a routerLink="/adatkezeles">Adatkezelés</a>
      </nav>
    }
  </div>
</header>
